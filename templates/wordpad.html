<link rel="stylesheet" href="templates/wordpad.css">
<div class="wordpad-chrome">
  <div class="wordpad-menubar">
    <span><u>F</u>ile</span>
    <span><u>E</u>dit</span>
    <span><u>V</u>iew</span>
    <span><u>I</u>nsert</span>
    <span>F<u>o</u>rmat</span>
    <span><u>H</u>elp</span>
  </div>
  <div class="wordpad-toolbar">
    <button class="wordpad-tool-btn" title="New">&#128196;</button>
    <button class="wordpad-tool-btn" title="Open">&#128193;</button>
    <button class="wordpad-tool-btn" title="Save">&#128190;</button>
    <div class="wordpad-tool-sep"></div>
    <button class="wordpad-tool-btn" title="Print">&#128424;</button>
    <button class="wordpad-tool-btn" title="Print Preview">&#128202;</button>
    <div class="wordpad-tool-sep"></div>
    <button class="wordpad-tool-btn" title="Find">&#128269;</button>
    <div class="wordpad-tool-sep"></div>
    <button class="wordpad-tool-btn" title="Cut">&#9986;</button>
    <button class="wordpad-tool-btn" title="Copy">&#128203;</button>
    <button class="wordpad-tool-btn" title="Paste">&#128196;</button>
    <div class="wordpad-tool-sep"></div>
    <button class="wordpad-tool-btn" title="Undo">&#8617;</button>
    <div class="wordpad-tool-sep"></div>
    <button class="wordpad-tool-btn" title="Date/Time">&#128336;</button>
  </div>
  <div class="wordpad-formatbar">
    <select class="wordpad-font-select" disabled>
      <option>Times New Roman</option>
    </select>
    <select class="wordpad-size-select" disabled>
      <option>12</option>
    </select>
    <div class="wordpad-fmt-sep"></div>
    <button class="wordpad-fmt-btn" title="Bold"><b>B</b></button>
    <button class="wordpad-fmt-btn" title="Italic"><i>I</i></button>
    <button class="wordpad-fmt-btn" title="Underline"><u>U</u></button>
    <button class="wordpad-fmt-btn" title="Color">A</button>
    <div class="wordpad-fmt-sep"></div>
    <button class="wordpad-fmt-btn" title="Align Left">&#8676;</button>
    <button class="wordpad-fmt-btn" title="Center">&#8596;</button>
    <button class="wordpad-fmt-btn" title="Align Right">&#8677;</button>
    <button class="wordpad-fmt-btn" title="Justify">&#8644;</button>
    <div class="wordpad-fmt-sep"></div>
    <button class="wordpad-fmt-btn" title="Bullets">&#8226;</button>
  </div>
  <div class="wordpad-ruler"></div>
  <div class="wordpad-body">
    <div class="wordpad-page"></div>
  </div>
  <div class="wordpad-statusbar"></div>
</div>
